<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <title>Speak Number Guessing Game</title>
        <script src="script.js" defer></script>
    </head>
    <body>
        <img src="images/mic.png" alt="Microphone to speak into" />
        <h1>Guess a number between 1 - 100</h1>
        <h3>Speak the number into your microphone!</h3>
        <button class="micEnabled" id="micEnabled">Click to enable mic.</button>
        <div id="msg" class="msg"></div>
        <footer>
            <p>This game is only playable on Google Chrome, as it uses JavaScripts </p>
            <a href="https://developer.mozilla.org/en-US/docs/Web/API/SpeechRecognition">Web Speech API.</a>
        </footer>
    </body>
</html>
